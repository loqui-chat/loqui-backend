services:
  postgres:
    image: postgres:16-alpine
    container_name: loqui-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - loqui-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loqui -d loqui"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: .
    image: loqui-backend
    command: ["/app/migrate", "up"]
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@localhost:${DB_PORT:-5432}/${DB_NAME}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: no

  api:
    build: .
    image: loqui-backend
    container_name: loqui-api
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@localhost:${DB_PORT:-5432}/${DB_NAME}?sslmode=disable
      HTTP_ADDR: ":${API_PORT:-8080}"
      NODE_ID: ${NODE_ID}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_FORMAT: ${LOG_FORMAT}
      ENV: dev
      # empty = ephemeral dev key. override with:
      #   JWT_PRIVATE_KEY="$(cat key.pem)" docker compose up
      JWT_PRIVATE_KEY_FILE: ${JWT_PRIVATE_KEY_FILE:-}
      ACCESS_TTL: ${ACCESS_TTL}
      REFRESH_TTL: ${REFRESH_TTL}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  loqui-pgdata:
