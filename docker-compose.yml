services:
  postgres:
    image: postgres:16-alpine
    container_name: loqui-postgres
    environment:
      POSTGRES_USER: loqui
      POSTGRES_PASSWORD: loqui
      POSTGRES_DB: loqui
    ports:
      - "5432:5432"
    volumes:
      - loqui-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loqui -d loqui"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  loqui-pgdata:
